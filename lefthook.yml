## Lefthook configuration — local enforcement so we don't pay for CI runs.
## On `bun install`, the `prepare` script wires these hooks into .git/hooks/.
## Skip everything once with: `LEFTHOOK=0 git commit ...`. Skip a specific hook
## with: `LEFTHOOK_EXCLUDE=test git push ...`.

pre-commit:
  parallel: true
  commands:
    typecheck:
      glob: "*.{ts,tsx}"
      run: bun run typecheck
      stage_fixed: false
    test-bun:
      glob: "{packages,apps}/**/*.{ts,tsx}"
      run: bun test
    test-rust:
      glob: "apps/desktop/src-tauri/**/*.rs"
      root: "apps/desktop/src-tauri"
      run: cargo test --lib
    test-ui:
      glob: "packages/ui/**/*.{ts,tsx}"
      root: "packages/ui"
      run: bunx vitest run --config vitest.config.ts

pre-push:
  parallel: false
  commands:
    typecheck:
      run: bun run typecheck
    test-bun:
      run: bun test
    test-rust:
      root: "apps/desktop/src-tauri"
      run: cargo test --lib
    test-ui:
      root: "packages/ui"
      run: bunx vitest run --config vitest.config.ts

## `bun run release:check` invokes the heavy gate (mutation testing,
## benchmarks, full UI render tests, end-to-end). Run manually before
## tagging a release — not wired into a hook because it takes ~3 minutes.
