## Lefthook configuration — local enforcement so we don't pay for CI runs.
## On `bun install`, the `prepare` script wires these hooks into .git/hooks/.
## Skip everything once with: `LEFTHOOK=0 git commit ...`. Skip a specific hook
## with: `LEFTHOOK_EXCLUDE=test git push ...`.

## `parallel: false` because `test-bun` and `test-ui` both spin up
## vite-style transforms. In parallel they race for the vite plugin
## context cache and trip `TransformPluginContext.error` from
## `vite/dist/node/chunks/dep-*.js`. The `create-pane-manager`
## stateful PBT was also producing false-positive counter-examples
## under that race. Sequential adds ~3-5s per commit; cheap insurance
## against having to LEFTHOOK=0 around every multi-area change.
pre-commit:
  parallel: false
  commands:
    typecheck:
      glob: "*.{ts,tsx}"
      run: bun run typecheck
      stage_fixed: false
    test-bun:
      glob: "{packages,apps}/**/*.{ts,tsx}"
      run: bun test
    test-rust:
      glob: "apps/desktop/src-tauri/**/*.rs"
      root: "apps/desktop/src-tauri"
      # Windows: embed the ComCtl32 v6 manifest into the test binary so it can
      # load (see src-tauri/build.rs); no-op on other platforms.
      env:
        ASCIIMARK_EMBED_TEST_MANIFEST: "1"
      run: cargo test --lib
    clippy:
      glob: "apps/desktop/src-tauri/**/*.rs"
      root: "apps/desktop/src-tauri"
      run: cargo clippy --all-targets -- -D warnings
    test-ui:
      glob: "packages/ui/**/*.{ts,tsx}"
      root: "packages/ui"
      run: bunx vitest run --config vitest.config.ts
    contract-ipc:
      glob: "{apps/desktop/src-tauri/src/**/*.rs,apps/desktop/src/**/*.{ts,tsx}}"
      run: bash scripts/check-ipc-contract.sh
    i18n-parity:
      glob: "packages/i18n/messages/*.json"
      run: bun scripts/i18n-check.ts

pre-push:
  parallel: false
  commands:
    typecheck:
      run: bun run typecheck
    test-bun:
      run: bun test
    test-rust:
      root: "apps/desktop/src-tauri"
      # Windows: embed the ComCtl32 v6 manifest into the test binary so it can
      # load (see src-tauri/build.rs); no-op on other platforms.
      env:
        ASCIIMARK_EMBED_TEST_MANIFEST: "1"
      run: cargo test --lib
    test-ui:
      root: "packages/ui"
      run: bunx vitest run --config vitest.config.ts
    i18n-parity:
      run: bun scripts/i18n-check.ts

## `bun run release:check` invokes the heavy gate (mutation testing,
## benchmarks, full UI render tests, end-to-end). Run manually before
## tagging a release — not wired into a hook because it takes ~3 minutes.
