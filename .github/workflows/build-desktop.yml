name: Build Desktop App

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  PUBLIC_RELEASES_REPO: djalmajr/asciimark-releases

jobs:
  build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust_targets: "aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            rust_targets: "x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
            rust_targets: ""
          - platform: windows-latest
            args: ""
            rust_targets: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2.9.1
        with:
          workspaces: "apps/desktop/src-tauri -> target"

      - name: Install frontend dependencies
        run: bun install

      # We invoke `tauri build` directly via bunx instead of using
      # `tauri-apps/tauri-action`. The action wraps the same call with
      # extra release-creation logic that we don't need (we publish to a
      # separate public repo via gh CLI in the publish-public-release job
      # below) and its assumptions about asset layout don't match our
      # multi-target macOS matrix. Direct invocation keeps the artifact
      # tree intact for the Stage step to consume.
      - name: Build Tauri app
        shell: bash
        working-directory: apps/desktop
        env:
          # Used by `tauri build` to sign the updater artifacts. When these
          # secrets are missing the build still succeeds, but the .sig files
          # won't be generated and the latest.json step will fail later.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bunx tauri build ${{ matrix.args }}

      # `@actions/glob` (used by upload-artifact's path matching) silently
      # drops multi-dot extensions like `.app.tar.gz`. We work around it by
      # listing files via `find -name` (which DOES handle multi-dot suffixes
      # correctly) into a `stage/` tree that mirrors `target/`'s structure,
      # then uploading the stage with a plain `**`. Path structure is
      # preserved so the publish step can still disambiguate macOS arm64 vs
      # x64 by their target subdir.
      #
      # Tauri 2.x with `createUpdaterArtifacts: true` produces v2-format
      # updater bundles (the installer is its own update asset; only the
      # signature is separate):
      #   macOS:   *.app.tar.gz + *.app.tar.gz.sig
      #   Linux:   *.AppImage   + *.AppImage.sig
      #   Windows: *-setup.exe  + *-setup.exe.sig (and *.msi + *.msi.sig)
      - name: Stage release artifacts
        shell: bash
        run: |
          set -euo pipefail
          cd apps/desktop/src-tauri
          while IFS= read -r f; do
            mkdir -p "stage/$(dirname "${f#target/}")"
            cp -p "$f" "stage/${f#target/}"
          done < <(find target -type f \( \
            -name "*.dmg" -o \
            -name "*.app.tar.gz" -o \
            -name "*.app.tar.gz.sig" -o \
            -name "*.deb" -o \
            -name "*.AppImage" -o \
            -name "*.AppImage.sig" -o \
            -name "*.msi" -o \
            -name "*.msi.sig" -o \
            -name "*-setup.exe" -o \
            -name "*-setup.exe.sig" \
          \))
          echo "── stage contents ──"
          find stage -type f | sort

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.platform }}-${{ matrix.rust_targets || 'default' }}
          path: apps/desktop/src-tauri/stage/**
          if-no-files-found: ignore

  publish-public-release:
    needs: build
    runs-on: ubuntu-latest
    if: always() && startsWith(github.ref, 'refs/tags/v') && !cancelled()
    permissions:
      contents: read
    steps:
      - name: Validate public release configuration
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_DIST_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::PUBLIC_DIST_TOKEN is not set. Configure this secret with write access to $PUBLIC_RELEASES_REPO."
            exit 1
          fi
          gh repo view "$PUBLIC_RELEASES_REPO" >/dev/null

      - name: Checkout source repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          # Don't merge — macOS arm64 and x64 generate `AsciiMark.app.tar.gz`
          # with the same filename and would overwrite each other. Keep them
          # in their per-matrix subdirs so the python script can disambiguate
          # by full path (`aarch64-apple-darwin` vs `x86_64-apple-darwin`).

      - name: Generate release notes from commits
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          PREVIOUS_TAG="$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)"
          export TAG PREVIOUS_TAG
          python <<'PY'
          import os
          import re
          import subprocess

          tag = os.environ["TAG"]
          previous_tag = os.environ.get("PREVIOUS_TAG", "").strip()
          revision_range = f"{previous_tag}..{tag}" if previous_tag else tag

          commits = subprocess.check_output(
              ["git", "log", revision_range, "--pretty=format:%h%x09%s", "--reverse"],
              text=True,
          ).splitlines()

          grouped_commits = {
              "build": [],
              "chore": [],
              "ci": [],
              "docs": [],
              "feat": [],
              "fix": [],
              "perf": [],
              "refactor": [],
              "revert": [],
              "test": [],
          }
          conventional_commit = re.compile(
              r"^(?P<type>[a-zA-Z]+)(?:\([^)]*\))?(?:!)?:\s*(?P<description>.+)$"
          )
          other_changes = []

          for line in commits:
              if "\t" not in line:
                  continue
              short_hash, subject = line.split("\t", 1)
              normalized_subject = subject.strip()
              entry = f"- {normalized_subject}"
              match = conventional_commit.match(normalized_subject)
              if not match:
                  other_changes.append(entry)
                  continue
              commit_type = match.group("type").lower()
              if commit_type in grouped_commits:
                  grouped_commits[commit_type].append(entry)
              else:
                  other_changes.append(entry)

          ordered_sections = [
              ("feat", "Features"),
              ("fix", "Fixes"),
              ("perf", "Performance"),
              ("refactor", "Refactors"),
              ("docs", "Documentation"),
              ("test", "Tests"),
              ("build", "Build"),
              ("ci", "CI"),
              ("chore", "Chores"),
              ("revert", "Reverts"),
          ]

          lines = []

          if not commits:
              lines.append("No commits found for this tag range.")
          else:
              for key, title in ordered_sections:
                  if not grouped_commits[key]:
                      continue
                  lines.append(f"## {title}")
                  lines.extend(grouped_commits[key])
                  lines.append("")
              if other_changes:
                  lines.append("## Other Changes")
                  lines.extend(other_changes)
                  lines.append("")

          with open("release-notes.md", "w", encoding="utf-8") as notes_file:
              notes_file.write("\n".join(lines).rstrip() + "\n")

          print("Generated release notes:")
          print(open("release-notes.md", encoding="utf-8").read())
          PY

      - name: Normalize assets and generate latest.json
        env:
          PUBLIC_REPO: ${{ env.PUBLIC_RELEASES_REPO }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          export TAG
          python <<'PY'
          import json
          import os
          import shutil
          from datetime import datetime, timezone
          from pathlib import Path

          source_dir = Path("artifacts")
          output_dir = Path("release-assets")
          output_dir.mkdir(parents=True, exist_ok=True)

          files = [path for path in source_dir.rglob("*") if path.is_file()]
          # Predicates now receive the FULL path (as a lowercased POSIX
          # string) so they can disambiguate by directory — e.g. macOS arm64
          # vs x64 generate the same file name (`AsciiMark.app.tar.gz`) but
          # live under different per-target subdirs.
          file_keys = {path: str(path).lower().replace("\\", "/") for path in files}

          def pick(target_name, predicate):
              candidates = [path for path in files if predicate(file_keys[path])]
              if not candidates:
                  return False
              candidates.sort(key=lambda p: len(p.name))
              source = candidates[0]
              destination = output_dir / target_name
              shutil.copy2(source, destination)
              print(f"Mapped {source.name} -> {destination.name}")
              return True

          # Normal installers (first install)
          pick("AsciiMark-macos-arm64.dmg", lambda key: key.endswith(".dmg") and ("arm64" in key or "aarch64" in key))
          pick("AsciiMark-macos-x64.dmg", lambda key: key.endswith(".dmg") and "arm64" not in key and "aarch64" not in key)
          pick("AsciiMark-linux-x64.AppImage", lambda key: key.endswith(".appimage"))
          pick("AsciiMark-linux-x64.deb", lambda key: key.endswith(".deb"))
          pick("AsciiMark-windows-x64.msi", lambda key: key.endswith(".msi"))
          pick(
              "AsciiMark-windows-x64.exe",
              lambda key: key.endswith(".exe") and ("installer" in key or "setup" in key),
          )

          # ── Updater artifacts (Tauri 2.x v2 format) ──
          # macOS still ships a separate update bundle (.app.tar.gz). On
          # Linux and Windows the *installer itself* is the update asset
          # — we just need to ship the matching .sig alongside the asset
          # we already copied above. So `pick_update` covers two shapes:
          #   1. macOS: copy the .app.tar.gz under a release-friendly name,
          #      then its .sig.
          #   2. Linux/Windows: the installer was already copied by the
          #      "Normal installers" block above; here we only add the .sig
          #      with a name that matches the installer's release name.
          update_targets = []  # [(asset_name, sig_name, platform_key)]

          def pick_update(asset_name, platform_key, predicate, *, copy_asset=True):
              candidates = [path for path in files if predicate(file_keys[path])]
              if not candidates:
                  print(f"WARN: no updater asset for {platform_key} ({asset_name})")
                  return
              candidates.sort(key=lambda p: len(p.name))
              source = candidates[0]
              if copy_asset:
                  destination = output_dir / asset_name
                  shutil.copy2(source, destination)
                  print(f"Mapped (update) {source} -> {destination.name}")
              else:
                  # Asset was already copied by the installer block; we just
                  # need to ensure it's present and locate its .sig.
                  if not (output_dir / asset_name).exists():
                      print(f"ERROR: expected installer {asset_name} not found in output_dir")
                      return

              sig_source = source.with_name(source.name + ".sig")
              if not sig_source.exists():
                  sig_candidates = [p for p in files if p.name == source.name + ".sig"]
                  if not sig_candidates:
                      print(f"ERROR: missing signature for {source.name} — TAURI_SIGNING_PRIVATE_KEY may not be set")
                      return
                  sig_source = sig_candidates[0]

              sig_name = asset_name + ".sig"
              shutil.copy2(sig_source, output_dir / sig_name)
              update_targets.append((asset_name, sig_name, platform_key))

          # macOS: disambiguate by per-target subdir in the path (set by --target)
          pick_update(
              "AsciiMark-macos-arm64.app.tar.gz",
              "darwin-aarch64",
              lambda key: key.endswith(".app.tar.gz") and ("aarch64" in key or "arm64" in key),
          )
          pick_update(
              "AsciiMark-macos-x64.app.tar.gz",
              "darwin-x86_64",
              lambda key: key.endswith(".app.tar.gz") and "aarch64" not in key and "arm64" not in key,
          )
          # Linux: the AppImage installer IS the update asset. We only
          # need to attach its .sig under the same release name.
          pick_update(
              "AsciiMark-linux-x64.AppImage",
              "linux-x86_64",
              lambda key: key.endswith(".appimage"),
              copy_asset=False,
          )
          # Windows: the *-setup.exe installer IS the update asset. Same
          # treatment — only the .sig needs to be added.
          pick_update(
              "AsciiMark-windows-x64.exe",
              "windows-x86_64",
              lambda key: key.endswith("-setup.exe"),
              copy_asset=False,
          )

          # ── Generate latest.json ──
          tag = os.environ["TAG"]
          version = tag.lstrip("v")
          public_repo = os.environ["PUBLIC_REPO"]
          release_url_base = f"https://github.com/{public_repo}/releases/download/{tag}"

          notes = ""
          notes_path = Path("release-notes.md")
          if notes_path.exists():
              notes = notes_path.read_text(encoding="utf-8").strip()

          platforms = {}
          for asset_name, sig_name, platform_key in update_targets:
              sig_content = (output_dir / sig_name).read_text(encoding="utf-8").strip()
              platforms[platform_key] = {
                  "signature": sig_content,
                  "url": f"{release_url_base}/{asset_name}",
              }

          if not platforms:
              print("WARN: latest.json has no platforms — auto-update will not work for this release.")
          else:
              latest_json = {
                  "version": version,
                  "notes": notes,
                  "pub_date": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
                  "platforms": platforms,
              }
              (output_dir / "latest.json").write_text(json.dumps(latest_json, indent=2))
              print("Generated latest.json:")
              print(json.dumps(latest_json, indent=2))

          generated_assets = list(output_dir.iterdir())
          if not generated_assets:
              raise SystemExit("No release assets were generated.")

          print("Generated assets:")
          for asset in sorted(generated_assets):
              print(asset.name)
          PY

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_DIST_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" --repo "$PUBLIC_RELEASES_REPO" >/dev/null 2>&1; then
            echo "Release $TAG already exists in $PUBLIC_RELEASES_REPO. Updating release notes."
            gh release edit "$TAG" \
              --repo "$PUBLIC_RELEASES_REPO" \
              --title "AsciiMark $TAG" \
              --notes-file release-notes.md
          else
            gh release create "$TAG" \
              --repo "$PUBLIC_RELEASES_REPO" \
              --title "AsciiMark $TAG" \
              --notes-file release-notes.md
          fi

      - name: Upload assets to public release
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_DIST_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release upload "$TAG" release-assets/* --clobber --repo "$PUBLIC_RELEASES_REPO"
