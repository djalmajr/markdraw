name: Build Desktop App

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust_targets: "aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            rust_targets: "x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
            rust_targets: ""
          - platform: windows-latest
            args: ""
            rust_targets: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "apps/desktop/src-tauri -> target"

      - name: Install frontend dependencies
        run: bun install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tauriScript: bunx tauri
          tagName: v__VERSION__
          releaseName: "AsciiMark v__VERSION__"
          releaseBody: "Download the installer for your platform from the assets below."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.platform }}-${{ matrix.rust_targets || 'default' }}
          path: |
            apps/desktop/src-tauri/target/**/bundle/**/*.dmg
            apps/desktop/src-tauri/target/**/bundle/**/*.app.tar.gz
            apps/desktop/src-tauri/target/**/bundle/**/*.deb
            apps/desktop/src-tauri/target/**/bundle/**/*.AppImage
            apps/desktop/src-tauri/target/**/bundle/**/*.msi
            apps/desktop/src-tauri/target/**/bundle/**/*.exe
            apps/desktop/src-tauri/target/**/bundle/**/*.nsis
          if-no-files-found: ignore

  upload-r2:
    needs: build
    runs-on: ubuntu-latest
    if: always() && startsWith(github.ref, 'refs/tags/v') && !cancelled()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Install rclone
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash

      - name: Configure rclone for R2
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << EOF
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${{ secrets.R2_ACCESS_KEY_ID }}
          secret_access_key = ${{ secrets.R2_SECRET_ACCESS_KEY }}
          endpoint = https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
          acl = private
          no_check_bucket = true
          EOF

      - name: Upload to R2
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "Uploading artifacts for tag: $TAG"
          find artifacts -type f | while read -r file; do
            filename=$(basename "$file")
            echo "Uploading $filename..."
            rclone copyto "$file" "r2:releases/asciimark/${TAG}/${filename}"
          done
          echo "Upload complete. Files in R2:"
          rclone ls "r2:releases/asciimark/${TAG}/"

      - name: Generate and upload latest.json
        run: |
          TAG="${GITHUB_REF_NAME}"
          BASE_URL="https://releases.djalmajr.dev/asciimark/${TAG}"
          FILES=$(find artifacts -type f -exec basename {} \; | sort)
          JSON="{\"version\":\"${TAG}\",\"date\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"files\":{"
          FIRST=true
          for file in $FILES; do
            ext="${file##*.}"
            case "$ext" in
              dmg)
                if echo "$file" | grep -qi "aarch64\|arm64"; then
                  key="macos-arm64"
                else
                  key="macos-x64"
                fi ;;
              AppImage) key="linux-appimage" ;;
              deb) key="linux-deb" ;;
              msi) key="windows-msi" ;;
              exe|nsis) key="windows-exe" ;;
              *) continue ;;
            esac
            if [ "$FIRST" = true ]; then FIRST=false; else JSON+=","; fi
            JSON+="\"${key}\":{\"url\":\"${BASE_URL}/${file}\",\"filename\":\"${file}\"}"
          done
          JSON+="}}"
          echo "$JSON" | jq '.' > latest.json
          echo "Generated latest.json:"
          cat latest.json
          rclone copyto latest.json "r2:releases/asciimark/latest.json"
