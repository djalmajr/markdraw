name: Build Desktop App

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

# Public repo → releases ship as GitHub Releases (free storage + bandwidth +
# CDN; no Cloudflare/R2 dependency). The Tauri updater and the marketing site
# read the stable "latest" URLs:
#   https://github.com/djalmajr/markdraw/releases/latest/download/<asset>
#
# IMPORTANT: GitHub's /releases/latest/ EXCLUDES prereleases, so the updater
# feed only resolves for STABLE releases (e.g. v0.22.0, not v0.22.0-1). Tag
# stable versions; a tag with a "-N" suffix is published as a prerelease and
# will NOT be served by the updater.
#
# Flow: create-release (draft + notes) → build (matrix, uploads renamed assets
# to the draft) → finalize-release (latest.json, then publishes the draft). The
# draft keeps /latest/ pointing at the PREVIOUS release until everything is in.

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Generate release notes from commits
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          PREVIOUS_TAG="$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)"
          export TAG PREVIOUS_TAG
          python <<'PY'
          import os
          import re
          import subprocess

          tag = os.environ["TAG"]
          previous_tag = os.environ.get("PREVIOUS_TAG", "").strip()
          revision_range = f"{previous_tag}..{tag}" if previous_tag else tag

          commits = subprocess.check_output(
              ["git", "log", revision_range, "--pretty=format:%h%x09%s", "--reverse"],
              text=True,
          ).splitlines()

          grouped_commits = {
              "build": [], "chore": [], "ci": [], "docs": [], "feat": [],
              "fix": [], "perf": [], "refactor": [], "revert": [], "test": [],
          }
          conventional_commit = re.compile(
              r"^(?P<type>[a-zA-Z]+)(?:\([^)]*\))?(?:!)?:\s*(?P<description>.+)$"
          )
          other_changes = []

          for line in commits:
              if "\t" not in line:
                  continue
              short_hash, subject = line.split("\t", 1)
              normalized_subject = subject.strip()
              entry = f"- {normalized_subject}"
              match = conventional_commit.match(normalized_subject)
              if not match:
                  other_changes.append(entry)
                  continue
              commit_type = match.group("type").lower()
              if commit_type in grouped_commits:
                  grouped_commits[commit_type].append(entry)
              else:
                  other_changes.append(entry)

          ordered_sections = [
              ("feat", "Features"), ("fix", "Fixes"), ("perf", "Performance"),
              ("refactor", "Refactors"), ("docs", "Documentation"), ("test", "Tests"),
              ("build", "Build"), ("ci", "CI"), ("chore", "Chores"), ("revert", "Reverts"),
          ]

          lines = []
          if not commits:
              lines.append("No commits found for this tag range.")
          else:
              for key, title in ordered_sections:
                  if not grouped_commits[key]:
                      continue
                  lines.append(f"## {title}")
                  lines.extend(grouped_commits[key])
                  lines.append("")
              if other_changes:
                  lines.append("## Other Changes")
                  lines.extend(other_changes)
                  lines.append("")

          with open("release-notes.md", "w", encoding="utf-8") as notes_file:
              notes_file.write("\n".join(lines).rstrip() + "\n")

          print("Generated release notes:")
          print(open("release-notes.md", encoding="utf-8").read())
          PY

      - name: Create the GitHub Release (draft)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          # Re-runnable: update notes if the release already exists, else create
          # it as a DRAFT so /latest/ keeps pointing at the previous release
          # until finalize-release publishes it with all assets in place.
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --notes-file release-notes.md
          else
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --draft \
              --title "Markdraw $TAG" --notes-file release-notes.md
          fi

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust_targets: "aarch64-apple-darwin"
            kind: macos
            asset_prefix: "Markdraw-macos-arm64"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            rust_targets: "x86_64-apple-darwin"
            kind: macos
            asset_prefix: "Markdraw-macos-x64"
          - platform: ubuntu-22.04
            args: ""
            rust_targets: ""
            kind: linux
            asset_prefix: "Markdraw-linux-x64"
          - platform: windows-latest
            args: ""
            rust_targets: ""
            kind: windows
            asset_prefix: "Markdraw-windows-x64"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2.9.1
        with:
          workspaces: "apps/desktop/src-tauri -> target"

      - name: Install frontend dependencies
        run: bun install

      # Apple notarization uses an App Store Connect API key (.p8). notarytool
      # reads it from a FILE, so we decode the base64 secret onto the runner and
      # export its absolute path for the build step below. macOS only; if the
      # secret is unset the file is empty and Tauri simply builds unsigned.
      - name: Prepare Apple notarization key (macOS)
        if: matrix.kind == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "${{ secrets.APPLE_API_KEY_P8_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          echo "APPLE_API_KEY_PATH=$RUNNER_TEMP/AuthKey.p8" >> "$GITHUB_ENV"

      # Direct `tauri build` (not tauri-action): the action's release logic
      # assumes a single-target asset layout that doesn't fit our multi-target
      # macOS matrix. We rename + upload to the GitHub Release ourselves below.
      - name: Build Tauri app
        shell: bash
        working-directory: apps/desktop
        env:
          # Signs the updater artifacts (produces the .sig files latest.json
          # needs). If missing, the build still succeeds but finalize warns.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple Developer ID signing + notarization (macOS). Tauri auto-signs,
          # notarizes and staples the .app when these are set; unset → unsigned
          # build (so the var stays harmless on the Linux/Windows matrix legs).
          # APPLE_API_KEY_PATH comes from the "Prepare Apple notarization key" step.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: bunx tauri build ${{ matrix.args }}

      # Each matrix entry builds exactly one target, so its bundle dir holds a
      # single asset per kind — no arm64-vs-x64 disambiguation needed. We rename
      # to the public release name and upload straight to the GitHub Release
      # (no actions/upload-artifact → no account-wide artifact-storage quota).
      #
      # Tauri 2.x v2 updater bundles: macOS *.app.tar.gz(+.sig); Linux the
      # *.AppImage IS the update asset (+.sig); Windows the *-setup.exe IS the
      # update asset (+.sig), plus the *.msi for first install.
      - name: Collect, rename, and upload release assets
        shell: bash
        working-directory: apps/desktop/src-tauri
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          PREFIX="${{ matrix.asset_prefix }}"
          mkdir -p out
          first() { find target -type f -name "$1" 2>/dev/null | head -1; }
          take() {
            local src dst="$2"
            src="$(first "$1")"
            if [ -n "$src" ] && [ -f "$src" ]; then
              cp -p "$src" "out/$dst"
              echo "  $src -> $dst"
            else
              echo "  (none) for pattern $1"
            fi
          }
          case "${{ matrix.kind }}" in
            macos)
              take '*.dmg'            "$PREFIX.dmg"
              take '*.app.tar.gz'     "$PREFIX.app.tar.gz"
              take '*.app.tar.gz.sig' "$PREFIX.app.tar.gz.sig"
              ;;
            linux)
              take '*.AppImage'       "$PREFIX.AppImage"
              take '*.AppImage.sig'   "$PREFIX.AppImage.sig"
              take '*.deb'            "$PREFIX.deb"
              ;;
            windows)
              take '*.msi'            "$PREFIX.msi"
              take '*-setup.exe'      "$PREFIX.exe"
              take '*-setup.exe.sig'  "$PREFIX.exe.sig"
              ;;
          esac
          echo "── uploading to $TAG ──"; ls -1 out
          gh release upload "$TAG" out/* --repo "$GITHUB_REPOSITORY" --clobber

  finalize-release:
    needs: build
    runs-on: ubuntu-latest
    if: always() && startsWith(github.ref, 'refs/tags/v') && !cancelled()
    permissions:
      contents: write
    steps:
      - name: Generate latest.json from the uploaded signatures
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          REPO="$GITHUB_REPOSITORY"
          mkdir -p sigs
          # Pull just the small .sig files back from the (draft) release.
          gh release download "$TAG" --repo "$REPO" --pattern '*.sig' --dir sigs --clobber || true
          NOTES="$(gh release view "$TAG" --repo "$REPO" --json body --jq .body 2>/dev/null || true)"
          export TAG REPO NOTES
          python <<'PY'
          import json, os
          from datetime import datetime, timezone

          tag = os.environ["TAG"]
          repo = os.environ["REPO"]
          version = tag.lstrip("v")
          base = f"https://github.com/{repo}/releases/download/{tag}"

          # (update-asset name, signature file, updater platform key)
          targets = [
              ("Markdraw-macos-arm64.app.tar.gz", "Markdraw-macos-arm64.app.tar.gz.sig", "darwin-aarch64"),
              ("Markdraw-macos-x64.app.tar.gz",   "Markdraw-macos-x64.app.tar.gz.sig",   "darwin-x86_64"),
              ("Markdraw-linux-x64.AppImage",     "Markdraw-linux-x64.AppImage.sig",     "linux-x86_64"),
              ("Markdraw-windows-x64.exe",        "Markdraw-windows-x64.exe.sig",        "windows-x86_64"),
          ]

          platforms = {}
          for asset, sig, key in targets:
              path = os.path.join("sigs", sig)
              if not os.path.exists(path):
                  print(f"WARN: missing {sig} — skipping {key} (its build may have failed)")
                  continue
              platforms[key] = {
                  "signature": open(path, encoding="utf-8").read().strip(),
                  "url": f"{base}/{asset}",
              }

          if not platforms:
              raise SystemExit("ERROR: no signatures found — latest.json would be empty")

          latest = {
              "version": version,
              "notes": os.environ.get("NOTES", "") or "",
              "pub_date": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "platforms": platforms,
          }
          with open("latest.json", "w", encoding="utf-8") as f:
              f.write(json.dumps(latest, indent=2))
          print(json.dumps(latest, indent=2))
          PY
          gh release upload "$TAG" latest.json --repo "$REPO" --clobber

      - name: Publish the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          # A "-N" pre-release identifier → GitHub prerelease (NOT served by
          # /releases/latest/). No suffix → stable, marked --latest.
          if [[ "$TAG" == *-* ]]; then
            echo "::warning::$TAG is a prerelease — the updater feed (/latest/) will NOT serve it."
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --draft=false --prerelease
          else
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --draft=false --latest
          fi
