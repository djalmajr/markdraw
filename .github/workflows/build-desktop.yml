name: Build Desktop App

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  PUBLIC_RELEASES_REPO: djalmajr/asciimark-releases

jobs:
  build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust_targets: "aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            rust_targets: "x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
            rust_targets: ""
          - platform: windows-latest
            args: ""
            rust_targets: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "apps/desktop/src-tauri -> target"

      - name: Install frontend dependencies
        run: bun install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: apps/desktop
          tauriScript: bunx tauri
          args: ${{ matrix.args }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.platform }}-${{ matrix.rust_targets || 'default' }}
          path: |
            apps/desktop/src-tauri/target/**/bundle/**/*.dmg
            apps/desktop/src-tauri/target/**/bundle/**/*.app.tar.gz
            apps/desktop/src-tauri/target/**/bundle/**/*.deb
            apps/desktop/src-tauri/target/**/bundle/**/*.AppImage
            apps/desktop/src-tauri/target/**/bundle/**/*.msi
            apps/desktop/src-tauri/target/**/bundle/**/*.exe
            apps/desktop/src-tauri/target/**/bundle/**/*.nsis
          if-no-files-found: ignore

  publish-public-release:
    needs: build
    runs-on: ubuntu-latest
    if: always() && startsWith(github.ref, 'refs/tags/v') && !cancelled()
    permissions:
      contents: read
    steps:
      - name: Validate public release configuration
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_DIST_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::PUBLIC_DIST_TOKEN is not set. Configure this secret with write access to $PUBLIC_RELEASES_REPO."
            exit 1
          fi
          gh repo view "$PUBLIC_RELEASES_REPO" >/dev/null

      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Normalize asset names
        run: |
          python <<'PY'
          from pathlib import Path
          import shutil

          source_dir = Path("artifacts")
          output_dir = Path("release-assets")
          output_dir.mkdir(parents=True, exist_ok=True)

          files = [path for path in source_dir.rglob("*") if path.is_file()]

          def pick(target_name, predicate):
              candidates = [path for path in files if predicate(path.name.lower())]
              if not candidates:
                  return False
              candidates.sort(key=lambda path: len(path.name))
              source = candidates[0]
              destination = output_dir / target_name
              shutil.copy2(source, destination)
              print(f"Mapped {source.name} -> {destination.name}")
              return True

          pick("AsciiMark-macos-arm64.dmg", lambda name: name.endswith(".dmg") and ("arm64" in name or "aarch64" in name))
          pick("AsciiMark-macos-x64.dmg", lambda name: name.endswith(".dmg") and "arm64" not in name and "aarch64" not in name)
          pick("AsciiMark-linux-x64.AppImage", lambda name: name.endswith(".appimage"))
          pick("AsciiMark-linux-x64.deb", lambda name: name.endswith(".deb"))
          pick("AsciiMark-windows-x64.msi", lambda name: name.endswith(".msi"))
          pick(
              "AsciiMark-windows-x64.exe",
              lambda name: name.endswith(".exe") and ("installer" in name or "setup" in name),
          )

          generated_assets = list(output_dir.iterdir())
          if not generated_assets:
              raise SystemExit("No release assets were generated.")

          print("Generated assets:")
          for asset in sorted(generated_assets):
              print(asset.name)
          PY

      - name: Generate release notes from commits
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          PREVIOUS_TAG="$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)"
          export TAG PREVIOUS_TAG
          python <<'PY'
          import os
          import re
          import subprocess

          tag = os.environ["TAG"]
          previous_tag = os.environ.get("PREVIOUS_TAG", "").strip()
          revision_range = f"{previous_tag}..{tag}" if previous_tag else tag

          commits = subprocess.check_output(
              ["git", "log", revision_range, "--pretty=format:%h%x09%s", "--reverse"],
              text=True,
          ).splitlines()

          grouped_commits = {
              "build": [],
              "chore": [],
              "ci": [],
              "docs": [],
              "feat": [],
              "fix": [],
              "perf": [],
              "refactor": [],
              "revert": [],
              "test": [],
          }
          conventional_commit = re.compile(
              r"^(?P<type>[a-zA-Z]+)(?:\([^)]*\))?(?:!)?:\s*(?P<description>.+)$"
          )
          other_changes = []

          for line in commits:
              if "\t" not in line:
                  continue
              short_hash, subject = line.split("\t", 1)
              normalized_subject = subject.strip()
              entry = f"- {normalized_subject}"
              match = conventional_commit.match(normalized_subject)
              if not match:
                  other_changes.append(entry)
                  continue
              commit_type = match.group("type").lower()
              if commit_type in grouped_commits:
                  grouped_commits[commit_type].append(entry)
              else:
                  other_changes.append(entry)

          ordered_sections = [
              ("feat", "Features"),
              ("fix", "Fixes"),
              ("perf", "Performance"),
              ("refactor", "Refactors"),
              ("docs", "Documentation"),
              ("test", "Tests"),
              ("build", "Build"),
              ("ci", "CI"),
              ("chore", "Chores"),
              ("revert", "Reverts"),
          ]

          lines = [f"# AsciiMark {tag}", ""]
          if previous_tag:
              lines.append(f"Changes since `{previous_tag}`.")
          else:
              lines.append("Initial tagged release.")
          lines.append("")

          if not commits:
              lines.append("No commits found for this tag range.")
          else:
              for key, title in ordered_sections:
                  if not grouped_commits[key]:
                      continue
                  lines.append(f"## {title}")
                  lines.extend(grouped_commits[key])
                  lines.append("")
              if other_changes:
                  lines.append("## Other Changes")
                  lines.extend(other_changes)
                  lines.append("")

          with open("release-notes.md", "w", encoding="utf-8") as notes_file:
              notes_file.write("\n".join(lines).rstrip() + "\n")

          print("Generated release notes:")
          print(open("release-notes.md", encoding="utf-8").read())
          PY

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_DIST_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" --repo "$PUBLIC_RELEASES_REPO" >/dev/null 2>&1; then
            echo "Release $TAG already exists in $PUBLIC_RELEASES_REPO. Updating release notes."
            gh release edit "$TAG" \
              --repo "$PUBLIC_RELEASES_REPO" \
              --title "AsciiMark $TAG" \
              --notes-file release-notes.md
          else
            gh release create "$TAG" \
              --repo "$PUBLIC_RELEASES_REPO" \
              --title "AsciiMark $TAG" \
              --notes-file release-notes.md
          fi

      - name: Upload assets to public release
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_DIST_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release upload "$TAG" release-assets/* --clobber --repo "$PUBLIC_RELEASES_REPO"
