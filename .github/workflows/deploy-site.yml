name: Deploy Site

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/site/**"
      - "packages/ui/src/components/ui/**"
      - "packages/core/src/**"

env:
  PUBLIC_RELEASES_REPO: djalmajr/asciimark-releases

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build site
        run: bun run --filter @asciimark/site build

      - name: Add SPA fallback for GitHub Pages
        run: cp "apps/site/dist/index.html" "apps/site/dist/404.html"

      - name: Validate public deploy configuration
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_DIST_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::PUBLIC_DIST_TOKEN is not set. Configure this secret with write access to $PUBLIC_RELEASES_REPO."
            exit 1
          fi
          gh repo view "$PUBLIC_RELEASES_REPO" >/dev/null

      - name: Publish site to GitHub Pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PUBLIC_DIST_TOKEN }}
          external_repository: ${{ env.PUBLIC_RELEASES_REPO }}
          publish_branch: gh-pages
          publish_dir: apps/site/dist
          force_orphan: true
          enable_jekyll: false
          cname: asciimark.djalmajr.dev
          full_commit_message: "Deploy public site"
