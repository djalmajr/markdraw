name: Deploy Site

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/site/**"
      - "packages/i18n/messages/**"

# The marketing site (markdraw.app) is hosted on Cloudflare Pages — project
# "markdraw". Releases live in a public R2 bucket; the source repo is private.
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build site
        run: bun run --filter @markdraw/site build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm install -g wrangler@4
          wrangler pages deploy apps/site/dist --project-name markdraw --branch main
