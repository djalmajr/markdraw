name: Deploy Site

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/site/**"
      - "packages/ui/src/components/ui/**"
      - "packages/core/src/**"

env:
  PUBLIC_RELEASES_REPO: djalmajr/asciimark-releases

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build site
        run: bun run --filter @asciimark/site build

      - name: Validate public deploy configuration
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_DIST_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::PUBLIC_DIST_TOKEN is not set. Configure this secret with write access to $PUBLIC_RELEASES_REPO."
            exit 1
          fi
          gh repo view "$PUBLIC_RELEASES_REPO" >/dev/null

      - name: Publish site to GitHub Pages branch
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_DIST_TOKEN }}
        run: |
          set -euo pipefail
          DEPLOY_DIR="apps/site/dist"
          DEPLOY_BRANCH="gh-pages"
          DEPLOY_REPO="${PUBLIC_RELEASES_REPO}"
          CNAME="asciimark.djalmajr.dev"

          # Set up a temp dir with the deploy content
          WORK=$(mktemp -d)
          cp -r "${DEPLOY_DIR}/." "${WORK}/"
          echo "${CNAME}" > "${WORK}/CNAME"
          touch "${WORK}/.nojekyll"

          cd "${WORK}"
          git init -b "${DEPLOY_BRANCH}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy public site"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${DEPLOY_REPO}.git"
          git push --force origin "${DEPLOY_BRANCH}"
          rm -rf "${WORK}"
