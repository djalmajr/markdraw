name: Deploy Site

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/site/**"
      - "packages/ui/src/components/ui/**"
      - "packages/core/src/**"

# After the Phase A migration the site deploys to the source repo's
# gh-pages branch (djalmajr/asciimark). asciimark-releases is left
# untouched until Phase C archives it. See
# wiki/process/operations-followups.md.
env:
  DEPLOY_REPO: djalmajr/asciimark

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      # `contents: write` so GITHUB_TOKEN can force-push to the
      # gh-pages branch of the source repo.
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build site
        run: bun run --filter @markdraw/site build

      - name: Publish site to GitHub Pages branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DEPLOY_DIR="apps/site/dist"
          DEPLOY_BRANCH="gh-pages"
          CNAME="asciimark.djalmajr.dev"

          # Set up a temp dir with the deploy content
          WORK=$(mktemp -d)
          cp -r "${DEPLOY_DIR}/." "${WORK}/"
          echo "${CNAME}" > "${WORK}/CNAME"
          touch "${WORK}/.nojekyll"

          cd "${WORK}"
          git init -b "${DEPLOY_BRANCH}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy public site"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${DEPLOY_REPO}.git"
          # Force-push because GitHub Pages publishes from whatever's at
          # the tip of gh-pages — keeping history adds no value here.
          git push --force origin "${DEPLOY_BRANCH}"
          rm -rf "${WORK}"
