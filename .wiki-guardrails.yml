# The wiki directory is gitignored — see `wiki/` rule in .gitignore.
# This guardrail file stays in the repo so local agent tooling
# (wiki-init / wiki-policy / wiki-query) can still locate the wiki
# on the developer's machine, but the wiki content itself is no
# longer part of the public source.
wiki_path: "./wiki"
qmd_index: "asciimark"
wiki_collection: "asciimark"
language: "pt-BR"
query_language: "pt-BR"
qmd_command: "~/.local/share/essential-skills/qmd/wrappers/asciimark-qmd"
harnesses:
  claude: true
  codex: true
  opencode: true
repo_markdown_allowlist:
  - README.md
  - AGENTS.md
  - CLAUDE.md
  - MIGRATION.md
  - CHANGELOG.md
  - SETUP.md
  - LICENSE.md
  - LICENSING.md
  - BACKLOG.md
  - apps/*/README.md
  - apps/*/SETUP.md
  - apps/*/CLAUDE.md
  - apps/*/AGENTS.md
  - apps/*/CHANGELOG.md
  - apps/*/.agents/*.md
  - apps/*/.agents/**/*.md
  - apps/*/.claude/*.md
  - apps/*/.claude/**/*.md
  - apps/*/.ai/*.md
  - apps/*/.ai/**/*.md
  - apps/*/planning/*.md
  - apps/*/planning/**/*.md
  - apps/*/test-results/*.md
  - apps/*/test-results/**/*.md
  - apps/*/project.inlang/*.md
  - apps/*/project.inlang/**/*.md
  - apps/*/src/**/README.md
  - apps/*/e2e/*.md
  - apps/*/e2e/**/*.md
  - apps/*/public/*.md
  - apps/*/public/**/*.md
  - planning/*.md
  - planning/**/*.md
  - .opencode/*.md
  - .opencode/**/*.md
  - packages/*/README.md
  - packages/*/CLAUDE.md
  - packages/*/AGENTS.md
  - packages/*/CHANGELOG.md
  - packages/*/src/**/*.md
  - packages/*/fuzz/*.md
  - packages/*/fuzz/**/*.md
  - charts/*.md
  - charts/**/*.md
  - .github/*.md
  - .github/**/*.md
  - .claude/*.md
  - .claude/**/*.md
  - .codex/*.md
  - .codex/**/*.md
sensitive_paths:
  - package.json
  - apps/*/package.json
  - packages/*/package.json
  - bun.lock
  - .mcp.json
  - .github/workflows/*
  - .github/workflows/**
  - lefthook.yml
  - lefthook.yaml
  - biome.json
  - apps/*/biome.json
  - packages/*/biome.json
  - wrangler.jsonc
  - apps/*/wrangler.jsonc
  - apps/*/src/server/db/*
  - apps/*/src/server/db/**
  - apps/*/src/server/db/schema*
  - apps/*/src/server/db/schema*/**
  - apps/*/src/server/auth/*
  - apps/*/src/server/auth/**
  - apps/*/drizzle/*
  - apps/*/drizzle/**
  - apps/*/worker-configuration.d.ts
  - apps/*/messages/*.json
  - packages/*/src/components/*
  - packages/*/src/components/**
